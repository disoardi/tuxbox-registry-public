# TuxBox Public Registry
# Community tools managed with TuxBox (https://github.com/disoardi/tuxbox)
#
# To add a tool, see CONTRIBUTING.md

# ── Python Tools ──────────────────────────────────────────────────────────────

[tools.sshmenuc]
name        = "sshmenuc"
repo        = "https://github.com/disoardi/sshmenuc"
branch      = "main"
version     = "1.4.2"
type        = "python"
isolation   = "venv"
description = "[DEPRECATED, see sshmenuc_rust] SSH connection manager with interactive TUI menu"
author      = "disoardi"

[tools.sshmenuc.commands]
run = "sshmenuc"

[tools.sshmenuc.dependencies]
python = ">=3.9"
poetry = true
system = ["openssh-client"]

[tools.cert_checker]
name        = "cert_checker"
repo        = "https://github.com/disoardi/cert-checker"
branch      = "main"
version     = "0.1.0"
type        = "python"
description = "SSL/TLS certificate management and verification Swiss Army knife"
author      = "disoardi"

[tools.cert_checker.commands]
run = "cert-checker"

[tools.cert_checker.dependencies]
python = ">=3.8"
poetry = true

# ── Native / Pre-built Binary Tools ───────────────────────────────────────────

[tools.hfs]
name        = "hfs"
repo        = "https://github.com/disoardi/hfs"
version     = "0.1.0"
type        = "native"
description = "HDFS CLI — no JVM required (ls, stat, du, health, schema inspection)"
author      = "disoardi"
# tbox downloads the pre-built binary from GitHub releases:
#   hfs-linux-x86_64 | hfs-macos-arm64

[tools.osctl]
name        = "osctl"
repo        = "https://github.com/disoardi/osctl-dist"
version     = "0.1.0"
type        = "native"
description = "TUI per gestione cluster OpenSearch — health readout, allocation, ISM, RBAC, audit"
author      = "disoardi"
# tbox downloads the pre-built binary from GitHub releases:
#   osctl-linux-x86_64

[tools.sshmenuc_rust]
name        = "sshmenuc"
repo        = "https://github.com/disoardi/sshmenuc-rust"
version     = "1.1.0"
type        = "native"
description = "SSH connection manager with interactive TUI menu (Rust rewrite of sshmenuc)"
author      = "disoardi"
# tbox downloads the pre-built binary from GitHub releases:
#   sshmenuc-linux-x86_64 | sshmenuc-macos-arm64
